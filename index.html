<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Odin Form</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header>
      <div class="odin-heading">
        <img src="images/odin-lined.png" alt="The Odin Project Logo" />
        <h1 class="odin-title">Odin</h1>
      </div>
      <p class="background-credit">
        Photo by
        <a href="https://unsplash.com/fr/@miyatankun">Takashi Miyazaki</a> from
        <a href="https://unsplash.com">Unsplash</a>.
      </p>
    </header>
    <main>
      <p>
        Lorem ipsum dolor sit amet consectetur adipisicing elit. At quo tempora
        placeat perferendis fugit nisi numquam nobis amet, ex repellendus!
      </p>
      <p>Lorem ipsum dolor sit amet consectetur.</p>

      <form action="">
        <section class="main-form">
          <h1>Let's do this !</h1>

          <div>
            <label for="first-name">First name</label>
            <input type="text" name="first-name" id="first-name" />
          </div>

          <div>
            <label for="last-name">Last name</label>
            <input type="text" name="last-name" id="last-name" />
          </div>

          <div>
            <label for="email">Email</label>
            <input type="email" name="email" id="email" />
          </div>

          <div>
            <label for="phone-number">Phone number</label>
            <input type="tel" name="phone-number" id="phone-number" />
          </div>

          <div>
            <label for="password">Password</label>
            <input type="password" name="password" id="password" />
          </div>

          <div>
            <label for="confirmed-password">Confirm password</label>
            <input
              type="password"
              name="confirmed-password"
              id="confirmed-password"
            />
          </div>
        </section>
        <button type="submit">Create Account</button>
      </form>

      <p>Already have an account ? <a class="login" href="">Log in</a></p>
    </main>
  </body>
</html>
